# Nginx reverse proxy untuk SoraBot
# Letakkan di: /etc/nginx/sites-available/sorabot
# Aktifkan: ln -s /etc/nginx/sites-available/sorabot /etc/nginx/sites-enabled/sorabot

server {
    listen 80;
    listen [::]:80;

    # Ganti dengan domain atau IP server kamu
    # server_name sorabot.example.com;
    server_name _;

    # Ukuran upload request
    client_max_body_size 10M;

    # Proxy semua ke API server (yang juga serve frontend)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Header standar
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (untuk realtime log)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}

